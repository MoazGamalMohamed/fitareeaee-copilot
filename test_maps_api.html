<!DOCTYPE html>
<html>
<head>
    <title>Google Maps API Test</title>
    <style>
        #map { height: 400px; width: 100%; }
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Google Maps API Test</h1>
    <div id="status" class="status">Testing API key...</div>
    <div id="map"></div>

    <script>
        function initMap() {
            try {
                const map = new google.maps.Map(document.getElementById('map'), {
                    center: { lat: 25.2048, lng: 55.2708 }, // Dubai
                    zoom: 12
                });
                
                document.getElementById('status').className = 'status success';
                document.getElementById('status').textContent = '✅ SUCCESS! Google Maps API is working correctly.';
                
                // Test Places API
                const service = new google.maps.places.PlacesService(map);
                document.getElementById('status').textContent += ' Places API also available.';
            } catch (error) {
                document.getElementById('status').className = 'status error';
                document.getElementById('status').textContent = '❌ ERROR: ' + error.message;
            }
        }
        
        function handleError() {
            document.getElementById('status').className = 'status error';
            document.getElementById('status').innerHTML = `
                <strong>❌ API Key Error</strong><br>
                <br>
                <strong>Possible causes:</strong><br>
                1. APIs not enabled (Maps JavaScript API, Places API, Geocoding API)<br>
                2. API key restrictions blocking localhost<br>
                3. Billing not enabled in Google Cloud Console<br>
                <br>
                <strong>Fix:</strong><br>
                • Go to: <a href="https://console.cloud.google.com/apis/library" target="_blank">Enable APIs</a><br>
                • Go to: <a href="https://console.cloud.google.com/apis/credentials" target="_blank">Check API Key Settings</a><br>
                • Go to: <a href="https://console.cloud.google.com/billing" target="_blank">Enable Billing</a>
            `;
        }
        
        window.gm_authFailure = handleError;
    </script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places&callback=initMap"
            async defer onerror="handleError()"></script>
</body>
</html>
